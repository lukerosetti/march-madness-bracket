<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Jack Hughes Jersey Bet</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b263b;
      --red: #bf0a30;
      --red-dark: #8b0000;
      --blue: #002868;
      --gold: #ffd700;
      --green: #00d4aa;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, var(--navy) 0%, #0a1628 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }
    
    .header-badge {
      background: var(--red);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .back-link {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link:hover {
      color: white;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: var(--gold);
    }
    
    /* Player Cards */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .player-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
    }
    
    .player-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    
    .player-avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      transition: all 0.3s;
    }
    
    .player-name-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
    }
    
    .player-name-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    
    .color-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .color-picker-group {
      flex: 1;
    }
    
    .color-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 10px;
    }
    
    .color-picker {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
    }
    
    .color-picker::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    
    .color-picker::-webkit-color-swatch {
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 4px;
    }
    
    .color-hex {
      font-family: monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .letter-input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .letter-input {
      width: 60px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      text-transform: uppercase;
    }
    
    .letter-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .preset-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .preset-btn:hover {
      border-color: white;
      transform: scale(1.1);
    }
    
    /* Draft Section */
    .draft-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    .draft-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .draft-btn.primary {
      background: linear-gradient(135deg, var(--green), #00a080);
      color: white;
    }
    
    .draft-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .draft-btn.danger {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: white;
    }
    
    .draft-btn:hover {
      transform: translateY(-2px);
    }
    
    .draft-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .draft-settings {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    .setting-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .setting-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }
    
    .setting-input {
      width: 80px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      color: white;
      font-size: 14px;
    }
    
    .setting-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .checkbox-wrap input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    /* Draft Order */
    .draft-order {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .draft-order-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.7);
    }
    
    .draft-order-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .draft-order-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: grab;
      transition: all 0.2s;
    }
    
    .draft-order-item:hover {
      background: rgba(255,255,255,0.15);
    }
    
    .draft-order-item.dragging {
      opacity: 0.5;
    }
    
    .order-number {
      width: 24px;
      height: 24px;
      background: var(--gold);
      color: #000;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    
    .order-avatar {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    
    /* Draft Status */
    .draft-status {
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .draft-status.inactive {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }
    
    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-badge.live {
      background: var(--green);
      color: #000;
    }
    
    .status-badge.inactive {
      background: rgba(255,255,255,0.2);
    }
    
    .current-pick {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--gold);
    }
    
    .current-picker {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
    }
    
    /* Team Grid for Draft */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding: 4px;
    }
    
    .team-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      font-size: 12px;
      text-align: left;
    }
    
    .team-btn:hover:not(.drafted) {
      background: rgba(255,255,255,0.1);
      border-color: var(--gold);
    }
    
    .team-btn.drafted {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .team-btn .seed {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    
    /* Score Update Section */
    .score-controls {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    
    .score-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .score-card.eliminated {
      opacity: 0.4;
    }
    
    .score-team-info {
      flex: 1;
    }
    
    .score-team-name {
      font-weight: 600;
      font-size: 13px;
    }
    
    .score-team-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    
    .score-btns {
      display: flex;
      gap: 6px;
    }
    
    .score-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .score-btn.win {
      background: var(--green);
      color: #000;
    }
    
    .score-btn.elim {
      background: var(--red);
      color: white;
    }
    
    .score-btn:hover {
      transform: scale(1.1);
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green);
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <a href="/" class="back-link">← Back to Viewer</a>
      <h1>COMMISSIONER PANEL</h1>
    </div>
    <div class="header-badge">ADMIN</div>
  </div>
  
  <!-- Player Customization -->
  <div class="section">
    <div class="section-title">👤 Player Avatars</div>
    <div class="players-grid" id="playersGrid"></div>
  </div>
  
  <!-- Draft Controls -->
  <div class="section">
    <div class="section-title">🎯 Snake Draft</div>
    
    <div class="draft-status" id="draftStatus">
      <div class="status-header">
        <span class="status-badge inactive">NOT STARTED</span>
      </div>
      <div>Configure settings and click "Start Draft" when ready</div>
    </div>
    
    <div class="draft-settings">
      <div class="setting-group">
        <span class="setting-label">Timer (seconds):</span>
        <input type="number" class="setting-input" id="timerInput" value="120" min="30" max="300">
      </div>
      <label class="checkbox-wrap">
        <input type="checkbox" id="testModeCheck">
        <span class="setting-label">Test Mode (doesn't save picks)</span>
      </label>
    </div>
    
    <div class="draft-order">
      <div class="draft-order-title">Draft Order (drag to reorder)</div>
      <div class="draft-order-list" id="draftOrderList"></div>
    </div>
    
    <div class="draft-controls">
      <button class="draft-btn primary" id="startDraftBtn" onclick="startDraft()">🚀 Start Draft</button>
      <button class="draft-btn secondary" id="endDraftBtn" onclick="endDraft()" disabled>⏹️ End Draft</button>
      <button class="draft-btn danger" onclick="resetDraft()">🔄 Reset Draft</button>
    </div>
    
    <div id="teamGrid" style="display: none;">
      <div class="section-title" style="margin-top: 20px;">Available Teams</div>
      <div class="team-grid" id="availableTeams"></div>
    </div>
  </div>
  
  <!-- Score Management -->
  <div class="section">
    <div class="section-title">📊 Update Scores</div>
    <p style="color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 16px;">
      Click ✓ to record a win, ✕ to eliminate a team
    </p>
    <div class="score-controls" id="scoreControls"></div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    let appData = null;
    let teamsData = null;
    let draftOrder = [];
    
    // Color presets
    const PRESETS = [
      { primary: '#bf0a30', secondary: '#8b0000' }, // Red
      { primary: '#002868', secondary: '#001845' }, // Blue
      { primary: '#2d5a27', secondary: '#1a3518' }, // Green
      { primary: '#7c3aed', secondary: '#5b21b6' }, // Purple
      { primary: '#f59e0b', secondary: '#d97706' }, // Orange
      { primary: '#000000', secondary: '#333333' }, // Black
      { primary: '#06b6d4', secondary: '#0891b2' }, // Cyan
      { primary: '#ec4899', secondary: '#db2777' }, // Pink
    ];
    
    async function loadData() {
      const [dataRes, teamsRes] = await Promise.all([
        fetch('/api/data'),
        fetch('/api/teams')
      ]);
      appData = await dataRes.json();
      teamsData = await teamsRes.json();
      
      draftOrder = appData.players.map((_, i) => i);
      
      renderPlayers();
      renderDraftOrder();
      renderDraftStatus();
      renderScoreControls();
    }
    
    function renderPlayers() {
      const html = appData.players.map((player, i) => `
        <div class="player-card">
          <div class="player-header">
            <div class="player-avatar-preview" id="avatar-${i}" 
                 style="background: linear-gradient(135deg, ${player.colorPrimary}, ${player.colorSecondary})">
              ${player.letter || player.name[0]}
            </div>
            <input type="text" class="player-name-input" value="${player.name}" 
                   onchange="updatePlayer(${i}, 'name', this.value)">
          </div>
          
          <div class="letter-input-wrap" style="margin-bottom: 12px;">
            <div class="color-label">Letter/Initials</div>
            <input type="text" class="letter-input" maxlength="2" value="${player.letter || player.name[0]}"
                   onchange="updatePlayer(${i}, 'letter', this.value.toUpperCase())">
          </div>
          
          <div class="color-row">
            <div class="color-picker-group">
              <div class="color-label">Primary Color</div>
              <div class="color-input-wrap">
                <input type="color" class="color-picker" value="${player.colorPrimary}"
                       onchange="updatePlayer(${i}, 'colorPrimary', this.value)">
                <span class="color-hex">${player.colorPrimary}</span>
              </div>
            </div>
            <div class="color-picker-group">
              <div class="color-label">Secondary Color</div>
              <div class="color-input-wrap">
                <input type="color" class="color-picker" value="${player.colorSecondary}"
                       onchange="updatePlayer(${i}, 'colorSecondary', this.value)">
                <span class="color-hex">${player.colorSecondary}</span>
              </div>
            </div>
          </div>
          
          <div class="color-label">Quick Presets</div>
          <div class="presets">
            ${PRESETS.map(p => `
              <button class="preset-btn" 
                      style="background: linear-gradient(135deg, ${p.primary}, ${p.secondary})"
                      onclick="applyPreset(${i}, '${p.primary}', '${p.secondary}')">
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');
      
      document.getElementById('playersGrid').innerHTML = html;
    }
    
    async function updatePlayer(index, field, value) {
      appData.players[index][field] = value;
      
      // Update avatar preview
      const avatar = document.getElementById(`avatar-${index}`);
      if (avatar) {
        avatar.style.background = `linear-gradient(135deg, ${appData.players[index].colorPrimary}, ${appData.players[index].colorSecondary})`;
        avatar.textContent = appData.players[index].letter || appData.players[index].name[0];
      }
      
      // Save to server
      await fetch(`/api/players/${index}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(appData.players[index])
      });
      
      showToast('Player updated!');
      renderDraftOrder();
    }
    
    function applyPreset(index, primary, secondary) {
      updatePlayer(index, 'colorPrimary', primary);
      updatePlayer(index, 'colorSecondary', secondary);
      
      // Update color pickers
      const card = document.querySelectorAll('.player-card')[index];
      const pickers = card.querySelectorAll('.color-picker');
      pickers[0].value = primary;
      pickers[1].value = secondary;
      const hexes = card.querySelectorAll('.color-hex');
      hexes[0].textContent = primary;
      hexes[1].textContent = secondary;
    }
    
    function renderDraftOrder() {
      const html = draftOrder.map((playerIdx, i) => {
        const player = appData.players[playerIdx];
        return `
          <div class="draft-order-item" draggable="true" data-index="${i}">
            <span class="order-number">${i + 1}</span>
            <div class="order-avatar" style="background: linear-gradient(135deg, ${player.colorPrimary}, ${player.colorSecondary})">
              ${player.letter || player.name[0]}
            </div>
            <span>${player.name}</span>
          </div>
        `;
      }).join('');
      
      document.getElementById('draftOrderList').innerHTML = html;
      
      // Setup drag and drop
      const items = document.querySelectorAll('.draft-order-item');
      items.forEach(item => {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
      });
    }
    
    let draggedIndex = null;
    
    function handleDragStart(e) {
      draggedIndex = parseInt(e.target.dataset.index);
      e.target.classList.add('dragging');
    }
    
    function handleDragOver(e) {
      e.preventDefault();
    }
    
    function handleDrop(e) {
      e.preventDefault();
      const dropIndex = parseInt(e.target.closest('.draft-order-item').dataset.index);
      
      if (draggedIndex !== null && draggedIndex !== dropIndex) {
        const item = draftOrder.splice(draggedIndex, 1)[0];
        draftOrder.splice(dropIndex, 0, item);
        renderDraftOrder();
      }
    }
    
    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedIndex = null;
    }
    
    function renderDraftStatus() {
      const state = appData.draftState;
      const container = document.getElementById('draftStatus');
      
      if (state.active) {
        // Calculate current picker (snake draft)
        const pickNum = state.currentPick;
        const round = Math.floor(pickNum / 4);
        const posInRound = pickNum % 4;
        const isReverse = round % 2 === 1;
        const pickerIdx = isReverse ? (3 - posInRound) : posInRound;
        const currentPicker = appData.players[state.order[pickerIdx]];
        
        container.className = 'draft-status';
        container.innerHTML = `
          <div class="status-header">
            <span class="status-badge live">🔴 LIVE${state.testMode ? ' (TEST)' : ''}</span>
          </div>
          <div class="current-pick">Pick #${pickNum + 1}</div>
          <div class="current-picker">
            <span style="display: inline-block; width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, ${currentPicker.colorPrimary}, ${currentPicker.colorSecondary}); vertical-align: middle; margin-right: 8px; text-align: center; line-height: 24px; font-size: 12px; font-weight: 700;">${currentPicker.letter}</span>
            ${currentPicker.name}'s turn
          </div>
        `;
        
        document.getElementById('startDraftBtn').disabled = true;
        document.getElementById('endDraftBtn').disabled = false;
        document.getElementById('teamGrid').style.display = 'block';
        renderAvailableTeams();
      } else {
        container.className = 'draft-status inactive';
        container.innerHTML = `
          <div class="status-header">
            <span class="status-badge inactive">NOT STARTED</span>
          </div>
          <div>Configure settings and click "Start Draft" when ready</div>
          ${state.picks?.length > 0 ? `<div style="margin-top: 8px; color: var(--gold);">${state.picks.length} picks completed</div>` : ''}
        `;
        
        document.getElementById('startDraftBtn').disabled = false;
        document.getElementById('endDraftBtn').disabled = true;
        document.getElementById('teamGrid').style.display = 'none';
      }
    }
    
    function renderAvailableTeams() {
      const draftedTeams = new Set(appData.draftState.picks?.map(p => p.team) || []);
      
      // Also include teams already assigned to players
      appData.players.forEach(p => p.teams.forEach(t => draftedTeams.add(t)));
      
      const teams = Object.entries(teamsData)
        .sort((a, b) => a[1].seed - b[1].seed || a[1].region.localeCompare(b[1].region));
      
      const html = teams.map(([name, info]) => {
        const drafted = draftedTeams.has(name);
        const seedClass = info.seed <= 4 ? 'seed-1-4' : 
                         info.seed <= 8 ? 'seed-5-8' : 
                         info.seed <= 12 ? 'seed-9-12' : 'seed-13-16';
        
        return `
          <button class="team-btn ${drafted ? 'drafted' : ''}" 
                  onclick="${drafted ? '' : `makePick('${name}')`}"
                  ${drafted ? 'disabled' : ''}>
            <span class="seed ${seedClass}">${info.seed}</span>
            <span>${name}</span>
          </button>
        `;
      }).join('');
      
      document.getElementById('availableTeams').innerHTML = html;
    }
    
    async function startDraft() {
      const timerSeconds = parseInt(document.getElementById('timerInput').value) || 120;
      const testMode = document.getElementById('testModeCheck').checked;
      
      await fetch('/api/draft/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          order: draftOrder,
          timerSeconds,
          testMode
        })
      });
      
      await loadData();
      showToast('Draft started!');
    }
    
    async function makePick(teamName) {
      const state = appData.draftState;
      const pickNum = state.currentPick;
      const round = Math.floor(pickNum / 4);
      const posInRound = pickNum % 4;
      const isReverse = round % 2 === 1;
      const pickerIdx = isReverse ? (3 - posInRound) : posInRound;
      const playerIndex = state.order[pickerIdx];
      
      await fetch('/api/draft/pick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teamName, playerIndex })
      });
      
      await loadData();
      showToast(`${appData.players[playerIndex].name} drafted ${teamName}!`);
    }
    
    async function endDraft() {
      await fetch('/api/draft/end', { method: 'POST' });
      await loadData();
      showToast('Draft ended!');
    }
    
    async function resetDraft() {
      if (!confirm('Are you sure? This will reset all draft progress.')) return;
      
      const clearTeams = confirm('Also clear all team assignments from players?');
      
      await fetch('/api/draft/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clearTeams })
      });
      
      await loadData();
      showToast('Draft reset!');
    }
    
    function renderScoreControls() {
      // Get all teams that have been drafted
      const draftedTeams = new Set();
      appData.players.forEach(p => p.teams.forEach(t => draftedTeams.add(t)));
      
      if (draftedTeams.size === 0) {
        document.getElementById('scoreControls').innerHTML = 
          '<p style="color: rgba(255,255,255,0.5);">No teams have been drafted yet.</p>';
        return;
      }
      
      const html = Array.from(draftedTeams).map(teamName => {
        const info = teamsData[teamName];
        if (!info) return '';
        
        // Find team in bracket
        let teamBracket = null;
        for (const region of Object.keys(appData.bracket)) {
          teamBracket = appData.bracket[region].find(t => t.name === teamName);
          if (teamBracket) break;
        }
        
        // Find owner
        let owner = null;
        appData.players.forEach(p => {
          if (p.teams.includes(teamName)) owner = p;
        });
        
        const isEliminated = teamBracket?.eliminated;
        const wins = teamBracket?.wins || 0;
        
        return `
          <div class="score-card ${isEliminated ? 'eliminated' : ''}">
            <div class="score-team-info">
              <div class="score-team-name">${teamName}</div>
              <div class="score-team-meta">
                ${owner?.name || 'Unowned'} · ${wins}W · ${isEliminated ? 'ELIMINATED' : 'Active'}
              </div>
            </div>
            <div class="score-btns">
              <button class="score-btn win" onclick="recordWin('${teamName}')" ${isEliminated ? 'disabled' : ''}>✓</button>
              <button class="score-btn elim" onclick="eliminateTeam('${teamName}')" ${isEliminated ? 'disabled' : ''}>✕</button>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('scoreControls').innerHTML = html;
    }
    
    async function recordWin(teamName) {
      await fetch('/api/win', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teamName })
      });
      await loadData();
      showToast(`${teamName} win recorded!`);
    }
    
    async function eliminateTeam(teamName) {
      if (!confirm(`Eliminate ${teamName}?`)) return;
      
      await fetch('/api/eliminate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teamName, round: 1 })
      });
      await loadData();
      showToast(`${teamName} eliminated`);
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    loadData();
  </script>
</body>
</html>
