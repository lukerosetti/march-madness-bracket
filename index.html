<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jack Hughes Jersey Bet | NCAAB 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b263b;
      --red: #bf0a30;
      --red-dark: #8b0000;
      --blue: #002868;
      --white: #ffffff;
      --gold: #ffd700;
      --green: #00d4aa;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, var(--navy) 0%, #0a1628 100%);
      color: var(--white);
      min-height: 100vh;
    }
    
    /* ============================================
       HEADER
    ============================================ */
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      padding: 16px 20px;
      border-bottom: 4px solid;
      border-image: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 30px, var(--white) 30px, var(--white) 60px, var(--blue) 60px, var(--blue) 90px) 1;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .flag-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(180deg, 
        var(--red) 0%, var(--red) 15%,
        var(--white) 15%, var(--white) 30%,
        var(--red) 30%, var(--red) 45%,
        var(--white) 45%, var(--white) 60%,
        var(--red) 60%, var(--red) 75%,
        var(--white) 75%, var(--white) 100%);
      position: relative;
      border: 2px solid var(--gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    
    .flag-logo::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 60%;
      background: var(--blue);
    }
    
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
    }
    
    .header-title h1 {
      font-size: 28px;
      letter-spacing: 2px;
      line-height: 1;
      background: linear-gradient(180deg, var(--white) 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    .header-title .subtitle {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 3px;
    }
    
    .jersey-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--white);
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      padding: 4px 14px;
      border-radius: 8px;
      border: 2px solid var(--gold);
      line-height: 1;
    }
    
    /* ============================================
       THE RACE - Progress bars header
    ============================================ */
    .race-container {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
    }
    
    .race-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .race-lanes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    
    .race-lane {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .race-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .race-track {
      flex: 1;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      position: relative;
      overflow: visible;
    }
    
    .race-progress {
      height: 100%;
      border-radius: 4px;
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
    }
    
    .race-potential {
      height: 100%;
      border-radius: 4px;
      position: absolute;
      top: 0;
      border: 2px dashed rgba(255,255,255,0.4);
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 4px, rgba(255,255,255,0.1) 4px, rgba(255,255,255,0.1) 8px);
    }
    
    .race-info {
      width: 80px;
      text-align: right;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }
    
    .race-finish {
      position: absolute;
      right: 90px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--gold);
      opacity: 0.5;
    }
    
    .race-finish::after {
      content: '🏆';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
    }
    
    .race-pills {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    .race-pill {
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
    }
    
    .race-pill strong {
      color: var(--gold);
    }
    
    /* ============================================
       TABS
    ============================================ */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      overflow-x: auto;
    }
    
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .tab.active {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      color: var(--white);
      border-color: var(--gold);
    }
    
    .tab-number {
      width: 22px;
      height: 22px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
    }
    
    .tab.active .tab-number {
      background: rgba(255,255,255,0.3);
    }
    
    /* ============================================
       CONTENT PANELS
    ============================================ */
    .content {
      padding: 16px;
    }
    
    .panel {
      display: none;
    }
    
    .panel.active {
      display: block;
    }
    
    /* ============================================
       STANDINGS TAB
    ============================================ */
    .standings-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .standing-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      transition: all 0.2s;
    }
    
    .standing-card:first-child {
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,180,0,0.08));
      border-color: rgba(255,215,0,0.3);
    }
    
    .standing-rank {
      font-size: 24px;
      width: 36px;
      text-align: center;
    }
    
    .standing-avatar {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
    }
    
    .standing-info {
      flex: 1;
    }
    
    .standing-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    
    .standing-teams {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .team-chip {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .team-chip.eliminated {
      opacity: 0.4;
      text-decoration: line-through;
    }
    
    .standing-points {
      text-align: right;
    }
    
    .points-current {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--gold);
      line-height: 1;
    }
    
    .points-potential {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    /* ============================================
       BRACKET TAB
    ============================================ */
    .bracket-regions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    @media (max-width: 768px) {
      .bracket-regions {
        grid-template-columns: 1fr;
      }
    }
    
    .bracket-region {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .region-header {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .region-teams {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .bracket-team {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .bracket-team:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .bracket-team.eliminated {
      opacity: 0.4;
    }
    
    .bracket-team.eliminated .team-name {
      text-decoration: line-through;
    }
    
    .seed-badge {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    
    .seed-1-4 { background: linear-gradient(135deg, var(--gold), #ffb800); color: #000; }
    .seed-5-8 { background: rgba(0,212,170,0.3); color: var(--green); }
    .seed-9-12 { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
    .seed-13-16 { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
    
    .team-name {
      flex: 1;
      font-weight: 500;
    }
    
    .team-owner {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    
    .team-wins {
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }
    
    /* ============================================
       LIVE TAB
    ============================================ */
    .live-games {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .live-game {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .live-game.is-live {
      border-color: rgba(239,68,68,0.5);
      background: rgba(239,68,68,0.08);
    }
    
    .game-team {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }
    
    .game-team + .game-team {
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .game-team.winner .team-name {
      color: var(--green);
    }
    
    .game-score {
      font-size: 18px;
      font-weight: 700;
      min-width: 36px;
      text-align: right;
    }
    
    .game-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .status-live {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #f87171;
      font-weight: 600;
      font-size: 12px;
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: #f87171;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .watch-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .watch-btn:hover {
      transform: scale(1.05);
    }
    
    .channel-badge {
      padding: 4px 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .no-games {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,255,0.5);
    }
    
    .no-games-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    /* ============================================
       SCORING TAB
    ============================================ */
    .scoring-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .scoring-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      margin-bottom: 12px;
      color: var(--gold);
    }
    
    .scoring-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    
    .scoring-item {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .scoring-round {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    
    .scoring-points {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--white);
    }
    
    .multiplier-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .multiplier-item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    
    .multiplier-seeds {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }
    
    .multiplier-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--green);
    }
    
    /* ============================================
       DRAFT TAB
    ============================================ */
    .draft-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    @media (max-width: 768px) {
      .draft-board {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    .draft-player {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
    }
    
    .draft-player-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .draft-player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    
    .draft-player-name {
      font-weight: 600;
    }
    
    .draft-player-count {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .draft-player-teams {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .draft-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      font-size: 12px;
    }
    
    .draft-team-seed {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }
    
    /* ============================================
       TEAM POPUP
    ============================================ */
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .popup-overlay.active {
      display: flex;
    }
    
    .team-popup {
      background: var(--navy-light);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .popup-header {
      padding: 20px;
      position: relative;
    }
    
    .popup-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
    
    .popup-team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      margin-bottom: 4px;
    }
    
    .popup-team-info {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    
    .popup-section {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .popup-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }
    
    .odds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    
    .odds-item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    
    .odds-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    
    .odds-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--green);
    }
    
    .odds-value.negative {
      color: var(--gold);
    }
    
    .quadrant-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .quadrant-item {
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }
    
    .quadrant-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    
    .quadrant-value {
      font-weight: 700;
      font-size: 14px;
    }
    
    .popup-owner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
    }
    
    .popup-owner-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }
    
    .popup-owner-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .popup-owner-name {
      font-weight: 600;
    }
    
    /* ============================================
       UTILITIES
    ============================================ */
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: 2px solid var(--gold);
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 100;
    }
    
    .last-update {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="flag-logo"></div>
        <div class="header-title">
          <h1>JACK HUGHES JERSEY BET</h1>
          <div class="subtitle">NCAAB 2026</div>
        </div>
      </div>
      <div class="jersey-number">2026</div>
    </div>
    
    <!-- THE RACE -->
    <div class="race-container" id="raceContainer">
      <div class="race-title">🏁 THE RACE</div>
      <div class="race-lanes" id="raceLanes"></div>
      <div class="race-pills" id="racePills"></div>
    </div>
  </header>
  
  <!-- TABS -->
  <nav class="tabs">
    <div class="tab active" data-tab="standings">
      <span class="tab-number">1</span>
      <span>Standings</span>
    </div>
    <div class="tab" data-tab="bracket">
      <span class="tab-number">2</span>
      <span>Bracket</span>
    </div>
    <div class="tab" data-tab="live">
      <span class="tab-number">3</span>
      <span>Live</span>
    </div>
    <div class="tab" data-tab="scoring">
      <span class="tab-number">4</span>
      <span>Scoring</span>
    </div>
    <div class="tab" data-tab="draft">
      <span class="tab-number">5</span>
      <span>Draft</span>
    </div>
  </nav>
  
  <!-- CONTENT -->
  <main class="content">
    <!-- Standings Panel -->
    <div class="panel active" id="standings">
      <div class="standings-list" id="standingsList"></div>
    </div>
    
    <!-- Bracket Panel -->
    <div class="panel" id="bracket">
      <div class="bracket-regions" id="bracketRegions"></div>
    </div>
    
    <!-- Live Panel -->
    <div class="panel" id="live">
      <div class="live-games" id="liveGames"></div>
    </div>
    
    <!-- Scoring Panel -->
    <div class="panel" id="scoring">
      <div class="scoring-section">
        <div class="scoring-title">Points Per Round</div>
        <div class="scoring-grid">
          <div class="scoring-item">
            <div class="scoring-round">Round 1</div>
            <div class="scoring-points">1</div>
          </div>
          <div class="scoring-item">
            <div class="scoring-round">Round 2</div>
            <div class="scoring-points">2</div>
          </div>
          <div class="scoring-item">
            <div class="scoring-round">Sweet 16</div>
            <div class="scoring-points">8</div>
          </div>
          <div class="scoring-item">
            <div class="scoring-round">Elite 8</div>
            <div class="scoring-points">16</div>
          </div>
          <div class="scoring-item">
            <div class="scoring-round">Final Four</div>
            <div class="scoring-points">32</div>
          </div>
          <div class="scoring-item">
            <div class="scoring-round">Championship</div>
            <div class="scoring-points">32</div>
          </div>
        </div>
      </div>
      
      <div class="scoring-section">
        <div class="scoring-title">Seed Multipliers</div>
        <div class="multiplier-grid">
          <div class="multiplier-item">
            <div class="multiplier-seeds">Seeds 1-4</div>
            <div class="multiplier-value">1x</div>
          </div>
          <div class="multiplier-item">
            <div class="multiplier-seeds">Seeds 5-8</div>
            <div class="multiplier-value">1.5x</div>
          </div>
          <div class="multiplier-item">
            <div class="multiplier-seeds">Seeds 9-12</div>
            <div class="multiplier-value">2x</div>
          </div>
          <div class="multiplier-item">
            <div class="multiplier-seeds">Seeds 13-16</div>
            <div class="multiplier-value">3x</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Draft Panel -->
    <div class="panel" id="draft">
      <div class="draft-board" id="draftBoard"></div>
    </div>
  </main>
  
  <div class="last-update" id="lastUpdate"></div>
  
  <!-- Refresh Button -->
  <button class="refresh-btn" onclick="loadData()">↻</button>
  
  <!-- Team Popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="team-popup" id="teamPopup"></div>
  </div>

  <script>
    let appData = null;
    let teamsData = null;
    let oddsData = null;
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
    
    // Load all data
    async function loadData() {
      try {
        const [dataRes, teamsRes, oddsRes, standingsRes] = await Promise.all([
          fetch('/api/data'),
          fetch('/api/teams'),
          fetch('/api/odds/all'),
          fetch('/api/standings')
        ]);
        
        appData = await dataRes.json();
        teamsData = await teamsRes.json();
        oddsData = await oddsRes.json();
        const standings = await standingsRes.json();
        
        renderRace(standings);
        renderStandings(standings);
        renderBracket();
        renderDraft();
        loadLiveGames();
        
        document.getElementById('lastUpdate').textContent = 
          `Last updated: ${new Date(appData.lastUpdate).toLocaleString()}`;
      } catch (err) {
        console.error('Failed to load data:', err);
      }
    }
    
    // Render The Race header
    function renderRace(standings) {
      const maxPossible = Math.max(...standings.map(s => s.maxPoints));
      const leader = standings[0];
      
      const lanes = standings.map(s => {
        const progressPct = maxPossible > 0 ? (s.totalPoints / maxPossible) * 100 : 0;
        const potentialPct = maxPossible > 0 ? (s.potentialPoints / maxPossible) * 100 : 0;
        
        return `
          <div class="race-lane">
            <div class="race-avatar" style="background: linear-gradient(135deg, ${s.colorPrimary}, ${s.colorSecondary})">${s.letter}</div>
            <div class="race-track">
              <div class="race-progress" style="width: ${Math.max(progressPct, 8)}%; background: linear-gradient(90deg, ${s.colorPrimary}, ${s.colorSecondary})">${s.totalPoints}</div>
              <div class="race-potential" style="left: ${progressPct}%; width: ${potentialPct}%"></div>
            </div>
            <div class="race-info">${s.teamsAlive} alive</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('raceLanes').innerHTML = lanes;
      
      // Pills
      const secondPlace = standings[1];
      const gap = leader.totalPoints - (secondPlace?.totalPoints || 0);
      const maxPotentialPlayer = standings.reduce((a, b) => a.maxPoints > b.maxPoints ? a : b);
      
      document.getElementById('racePills').innerHTML = `
        <div class="race-pill"><strong>${leader.name}</strong> leads by ${gap} pts</div>
        <div class="race-pill">Max potential: <strong>${maxPotentialPlayer.name}</strong> (${maxPotentialPlayer.maxPoints})</div>
        <div class="race-pill">${standings.reduce((sum, s) => sum + s.teamsAlive, 0)} teams still alive</div>
      `;
    }
    
    // Render standings
    function renderStandings(standings) {
      const html = standings.map((s, i) => {
        const rank = i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
        
        const teamChips = s.teams.map(teamName => {
          const team = teamsData[teamName];
          if (!team) return '';
          
          // Check if eliminated
          let eliminated = false;
          for (const region of Object.keys(appData.bracket)) {
            const t = appData.bracket[region].find(x => x.name === teamName);
            if (t?.eliminated) eliminated = true;
          }
          
          return `
            <span class="team-chip ${eliminated ? 'eliminated' : ''}" 
                  style="background: linear-gradient(135deg, ${team.colors[0]}, ${team.colors[0]}dd)"
                  onclick="showTeamPopup('${teamName}')">
              ${teamName}
            </span>
          `;
        }).join('');
        
        return `
          <div class="standing-card">
            <div class="standing-rank">${rank}</div>
            <div class="standing-avatar" style="background: linear-gradient(135deg, ${s.colorPrimary}, ${s.colorSecondary})">${s.letter}</div>
            <div class="standing-info">
              <div class="standing-name">${s.name}</div>
              <div class="standing-teams">${teamChips}</div>
            </div>
            <div class="standing-points">
              <div class="points-current">${s.totalPoints}</div>
              <div class="points-potential">+${s.potentialPoints} potential</div>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('standingsList').innerHTML = html;
    }
    
    // Render bracket
    function renderBracket() {
      const regions = ['East', 'South', 'West', 'Midwest'];
      
      const html = regions.map(region => {
        const teams = appData.bracket[region] || [];
        
        const teamRows = teams.map(team => {
          const info = teamsData[team.name];
          if (!info) return '';
          
          // Find owner
          let owner = null;
          appData.players.forEach((p, i) => {
            if (p.teams.includes(team.name)) owner = { ...p, index: i };
          });
          
          const seedClass = info.seed <= 4 ? 'seed-1-4' : 
                           info.seed <= 8 ? 'seed-5-8' : 
                           info.seed <= 12 ? 'seed-9-12' : 'seed-13-16';
          
          return `
            <div class="bracket-team ${team.eliminated ? 'eliminated' : ''}" onclick="showTeamPopup('${team.name}')">
              <div class="seed-badge ${seedClass}">${info.seed}</div>
              <div class="team-name">${team.name}</div>
              ${owner ? `<div class="team-owner" style="background: linear-gradient(135deg, ${owner.colorPrimary}, ${owner.colorSecondary})">${owner.letter}</div>` : ''}
              ${team.wins > 0 ? `<div class="team-wins">${team.wins}W</div>` : ''}
            </div>
          `;
        }).join('');
        
        return `
          <div class="bracket-region">
            <div class="region-header">${region.toUpperCase()} REGION</div>
            <div class="region-teams">${teamRows}</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('bracketRegions').innerHTML = html;
    }
    
    // Load live games
    async function loadLiveGames() {
      try {
        const res = await fetch('/api/scores');
        const data = await res.json();
        
        if (!data.events || data.events.length === 0) {
          document.getElementById('liveGames').innerHTML = `
            <div class="no-games">
              <div class="no-games-icon">🏀</div>
              <div>No games right now</div>
              <div style="margin-top: 8px; font-size: 13px;">Check back during tournament games!</div>
            </div>
          `;
          return;
        }
        
        const html = data.events.map(event => {
          const comp = event.competitions[0];
          const teams = comp.competitors;
          const status = comp.status;
          const isLive = status.type.state === 'in';
          const isFinal = status.type.completed;
          
          // Determine broadcast channel
          const broadcast = comp.broadcasts?.[0]?.names?.[0] || 'TV';
          
          const teamRows = teams.map(t => {
            const isWinner = isFinal && t.winner;
            const teamInfo = teamsData[t.team.displayName];
            
            // Find owner
            let owner = null;
            appData.players.forEach((p, i) => {
              if (p.teams.includes(t.team.displayName)) owner = { ...p, index: i };
            });
            
            return `
              <div class="game-team ${isWinner ? 'winner' : ''}">
                <div class="seed-badge ${t.curatedRank?.current <= 4 ? 'seed-1-4' : 'seed-5-8'}">${t.curatedRank?.current || '-'}</div>
                <div class="team-name" style="flex: 1">${t.team.displayName}</div>
                ${owner ? `<div class="team-owner" style="background: linear-gradient(135deg, ${owner.colorPrimary}, ${owner.colorSecondary})">${owner.letter}</div>` : ''}
                <div class="game-score">${t.score || '-'}</div>
              </div>
            `;
          }).join('');
          
          return `
            <div class="live-game ${isLive ? 'is-live' : ''}">
              ${teamRows}
              <div class="game-status">
                ${isLive ? `
                  <div class="status-live">
                    <span class="live-dot"></span>
                    ${status.displayClock || ''} - ${status.period === 1 ? '1st Half' : '2nd Half'}
                  </div>
                ` : isFinal ? `
                  <span style="color: var(--green); font-size: 12px; font-weight: 600">✓ FINAL</span>
                ` : `
                  <span style="font-size: 12px; color: rgba(255,255,255,0.5)">${new Date(event.date).toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'})}</span>
                `}
                <div style="display: flex; gap: 8px; align-items: center">
                  <span class="channel-badge">${broadcast}</span>
                  <a href="https://www.ncaa.com/march-madness-live/watch" target="_blank" class="watch-btn">▶ Watch</a>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('liveGames').innerHTML = html;
      } catch (err) {
        console.error('Failed to load live games:', err);
        document.getElementById('liveGames').innerHTML = `
          <div class="no-games">
            <div class="no-games-icon">📡</div>
            <div>Unable to load live scores</div>
          </div>
        `;
      }
    }
    
    // Render draft board
    function renderDraft() {
      const html = appData.players.map((player, i) => {
        const teamsList = player.teams.map(teamName => {
          const info = teamsData[teamName];
          if (!info) return '';
          
          const seedClass = info.seed <= 4 ? 'seed-1-4' : 
                           info.seed <= 8 ? 'seed-5-8' : 
                           info.seed <= 12 ? 'seed-9-12' : 'seed-13-16';
          
          return `
            <div class="draft-team" onclick="showTeamPopup('${teamName}')">
              <div class="draft-team-seed ${seedClass}">${info.seed}</div>
              <span>${teamName}</span>
            </div>
          `;
        }).join('');
        
        return `
          <div class="draft-player">
            <div class="draft-player-header">
              <div class="draft-player-avatar" style="background: linear-gradient(135deg, ${player.colorPrimary}, ${player.colorSecondary})">${player.letter}</div>
              <div>
                <div class="draft-player-name">${player.name}</div>
                <div class="draft-player-count">${player.teams.length} teams</div>
              </div>
            </div>
            <div class="draft-player-teams">${teamsList || '<div style="color: rgba(255,255,255,0.4); font-size: 12px; padding: 8px">No teams drafted yet</div>'}</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('draftBoard').innerHTML = html;
    }
    
    // Show team popup
    function showTeamPopup(teamName) {
      const team = teamsData[teamName];
      if (!team) return;
      
      // Find owner
      let owner = null;
      appData.players.forEach((p, i) => {
        if (p.teams.includes(teamName)) owner = { ...p, index: i };
      });
      
      // Get odds
      const champOdds = oddsData.championship[teamName];
      const ffOdds = oddsData.finalFour[teamName];
      
      const popup = document.getElementById('teamPopup');
      popup.innerHTML = `
        <div class="popup-header" style="background: linear-gradient(135deg, ${team.colors[0]}, ${team.colors[0]}cc)">
          <button class="popup-close" onclick="closePopup()">✕</button>
          <div class="popup-team-name">${teamName}</div>
          <div class="popup-team-info">#${team.seed} Seed · ${team.region} Region · ${team.record}</div>
        </div>
        
        ${champOdds || ffOdds ? `
          <div class="popup-section">
            <div class="popup-section-title">Championship Odds (Live)</div>
            <div class="odds-grid">
              ${champOdds ? `
                <div class="odds-item">
                  <div class="odds-label">Championship</div>
                  <div class="odds-value">${champOdds}</div>
                </div>
              ` : ''}
              ${ffOdds ? `
                <div class="odds-item">
                  <div class="odds-label">Final Four</div>
                  <div class="odds-value ${ffOdds.startsWith('-') ? 'negative' : ''}">${ffOdds}</div>
                </div>
              ` : ''}
              <div class="odds-item">
                <div class="odds-label">NET Rank</div>
                <div class="odds-value">#${team.net}</div>
              </div>
            </div>
          </div>
        ` : ''}
        
        <div class="popup-section">
          <div class="popup-section-title">Quadrant Record</div>
          <div class="quadrant-grid">
            <div class="quadrant-item">
              <div class="quadrant-label">Q1</div>
              <div class="quadrant-value">${team.q1}</div>
            </div>
            <div class="quadrant-item">
              <div class="quadrant-label">Q2</div>
              <div class="quadrant-value">${team.q2}</div>
            </div>
            <div class="quadrant-item">
              <div class="quadrant-label">Q3</div>
              <div class="quadrant-value">${team.q3}</div>
            </div>
            <div class="quadrant-item">
              <div class="quadrant-label">Q4</div>
              <div class="quadrant-value">${team.q4}</div>
            </div>
          </div>
        </div>
        
        ${owner ? `
          <div class="popup-owner">
            <div class="popup-owner-avatar" style="background: linear-gradient(135deg, ${owner.colorPrimary}, ${owner.colorSecondary})">${owner.letter}</div>
            <div>
              <div class="popup-owner-label">Drafted by</div>
              <div class="popup-owner-name">${owner.name}</div>
            </div>
          </div>
        ` : ''}
      `;
      
      document.getElementById('popupOverlay').classList.add('active');
    }
    
    function closePopup() {
      document.getElementById('popupOverlay').classList.remove('active');
    }
    
    document.getElementById('popupOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'popupOverlay') closePopup();
    });
    
    // Auto-refresh live games every 30 seconds
    setInterval(loadLiveGames, 30000);
    
    // Initial load
    loadData();
  </script>
</body>
</html>
