<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - March Madness</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#1c1917;color:#fafaf9;padding:20px}
    #app{max-width:1000px;margin:0 auto}
    h1{font-size:24px;margin-bottom:20px;text-align:center}
    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
    .tab{padding:10px 20px;border:1px solid #444;border-radius:8px;background:#292524;cursor:pointer;color:#fafaf9}
    .tab.active{background:#BA7517;border-color:#BA7517}
    .card{background:#292524;border:1px solid #444;border-radius:12px;padding:20px;margin-bottom:16px}
    input[type=text]{width:100%;padding:10px;border:1px solid #444;border-radius:8px;background:#1c1917;color:#fafaf9;margin-bottom:10px}
    button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    .btn-primary{background:#BA7517;color:#fff}
    .btn-danger{background:#991b1b;color:#fff;padding:6px 12px;font-size:12px}
    .player-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#1c1917;border-radius:8px;margin-bottom:8px}
    .team-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .seed{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#E6F1FB;color:#0C447C}
    .team-input{flex:1;padding:8px;border:1px solid #444;border-radius:6px;background:#1c1917;color:#fafaf9}
    .wins-btn{width:28px;height:28px;border:1px solid #444;border-radius:6px;background:#292524;color:#fafaf9;cursor:pointer;font-size:16px}
    .region{margin-bottom:24px}
    .region-title{font-size:18px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #BA7517}
    .hidden{display:none}
  </style>
</head>
<body>
  <div id="app">
    <h1>🔧 Commissioner Panel</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('bracket')">📝 Edit Bracket</button>
      <button class="tab" onclick="showTab('players')">👥 Players</button>
      <button class="tab" onclick="showTab('leaderboard')">🏆 Leaderboard</button>
    </div>
    <div id="bracket-tab"></div>
    <div id="players-tab" class="hidden"></div>
    <div id="leaderboard-tab" class="hidden"></div>
  </div>

  <script>
    var data = { players: [], bracket: {}, lastUpdate: null };
    var REGIONS = ['East', 'West', 'South', 'Midwest'];
    var ROUND_POINTS = {1:1, 2:2, 3:8, 4:16, 5:32, 6:32};

    function seedMultiplier(seed) {
      if (seed <= 4) return 1;
      if (seed <= 8) return 1.5;
      if (seed <= 12) return 2;
      return 3;
    }

    function calculateScore(player) {
      var total = 0;
      if (!player.teams) return 0;
      player.teams.forEach(function(tn) {
        REGIONS.forEach(function(region) {
          if (!data.bracket[region]) return;
          var team = data.bracket[region].find(function(t) { return t.name.toLowerCase() === tn.toLowerCase(); });
          if (team) {
            for (var i = 1; i <= team.wins; i++) {
              total += (ROUND_POINTS[i] || 0) * seedMultiplier(team.seed);
            }
          }
        });
      });
      return Math.round(total * 10) / 10;
    }

    function fetchData() {
      fetch('/api/data')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          data = d;
          renderBracket();
          renderPlayers();
          renderLeaderboard();
        });
    }

    function saveData() {
      fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t, i) {
        t.classList.toggle('active', (tab === 'bracket' && i === 0) || (tab === 'players' && i === 1) || (tab === 'leaderboard' && i === 2));
      });
      document.getElementById('bracket-tab').classList.toggle('hidden', tab !== 'bracket');
      document.getElementById('players-tab').classList.toggle('hidden', tab !== 'players');
      document.getElementById('leaderboard-tab').classList.toggle('hidden', tab !== 'leaderboard');
    }

    function renderBracket() {
      var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">';
      REGIONS.forEach(function(region) {
        html += '<div class="card"><div class="region-title">' + region + ' Region</div>';
        if (data.bracket[region]) {
          data.bracket[region].forEach(function(team) {
            var seedColor = team.seed <= 4 ? '#E6F1FB;color:#0C447C' : team.seed <= 8 ? '#EAF3DE;color:#3B6D11' : team.seed <= 12 ? '#FAEEDA;color:#854F0B' : '#FAECE7;color:#993C1D';
            html += '<div class="team-row" style="opacity:' + (team.eliminated ? '0.5' : '1') + '">';
            html += '<div class="seed" style="background:' + seedColor + '">' + team.seed + '</div>';
            html += '<input class="team-input" value="' + team.name + '" onchange="updateTeamName(\'' + region + '\',' + team.seed + ',this.value)">';
            html += '<button class="wins-btn" onclick="changeWins(\'' + region + '\',' + team.seed + ',-1)">-</button>';
            html += '<span style="width:20px;text-align:center">' + team.wins + '</span>';
            html += '<button class="wins-btn" onclick="changeWins(\'' + region + '\',' + team.seed + ',1)">+</button>';
            html += '<button style="padding:4px 8px;border-radius:4px;border:1px solid;font-size:10px;cursor:pointer;background:' + (team.eliminated ? '#450a0a;color:#fca5a5;border-color:#991b1b' : '#14532d;color:#86efac;border-color:#166534') + '" onclick="toggleElim(\'' + region + '\',' + team.seed + ')">' + (team.eliminated ? 'OUT' : 'IN') + '</button>';
            html += '</div>';
          });
        }
        html += '</div>';
      });
      html += '</div>';
      document.getElementById('bracket-tab').innerHTML = html;
    }

    function renderPlayers() {
      var html = '<div class="card">';
      html += '<input type="text" id="new-player" placeholder="Enter player name">';
      html += '<button class="btn-primary" onclick="addPlayer()">Add Player</button>';
      html += '</div>';
      
      if (data.players.length === 0) {
        html += '<div class="card"><p style="text-align:center;color:#a8a29e">No players yet</p></div>';
      } else {
        data.players.forEach(function(player, idx) {
          html += '<div class="card">';
          html += '<div class="player-row"><strong>' + player.name + '</strong><button class="btn-danger" onclick="removePlayer(' + idx + ')">Remove</button></div>';
          html += '<input type="text" id="teams-' + idx + '" value="' + (player.teams || []).join(', ') + '" placeholder="Teams (comma separated)" onchange="updateTeams(' + idx + ',this.value)">';
          html += '</div>';
        });
      }
      document.getElementById('players-tab').innerHTML = html;
    }

    function renderLeaderboard() {
      var sorted = data.players.slice().sort(function(a, b) { return calculateScore(b) - calculateScore(a); });
      var html = '';
      if (sorted.length === 0) {
        html = '<div class="card"><p style="text-align:center;color:#a8a29e">No players yet</p></div>';
      } else {
        sorted.forEach(function(player, i) {
          var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
          html += '<div class="card" style="display:flex;align-items:center;gap:16px">';
          html += '<div style="font-size:24px;width:40px;text-align:center">' + medal + '</div>';
          html += '<div style="flex:1"><strong>' + player.name + '</strong><br><span style="font-size:13px;color:#a8a29e">' + (player.teams || []).join(', ') + '</span></div>';
          html += '<div style="font-size:24px;font-weight:700;color:#BA7517">' + calculateScore(player).toFixed(1) + '</div>';
          html += '</div>';
        });
      }
      document.getElementById('leaderboard-tab').innerHTML = html;
    }

    function updateTeamName(region, seed, name) {
      var team = data.bracket[region].find(function(t) { return t.seed === seed; });
      if (team) { team.name = name; saveData(); }
    }

    function changeWins(region, seed, delta) {
      var team = data.bracket[region].find(function(t) { return t.seed === seed; });
      if (team) { 
        team.wins = Math.max(0, Math.min(6, team.wins + delta)); 
        saveData(); 
        renderBracket();
        renderLeaderboard();
      }
    }

    function toggleElim(region, seed) {
      var team = data.bracket[region].find(function(t) { return t.seed === seed; });
      if (team) { team.eliminated = !team.eliminated; saveData(); renderBracket(); }
    }

    function addPlayer() {
      var input = document.getElementById('new-player');
      var name = input.value.trim();
      if (name && !data.players.find(function(p) { return p.name === name; })) {
        data.players.push({ name: name, teams: [] });
        input.value = '';
        saveData();
        renderPlayers();
      }
    }

    function removePlayer(idx) {
      data.players.splice(idx, 1);
      saveData();
      renderPlayers();
      renderLeaderboard();
    }

    function updateTeams(idx, value) {
      data.players[idx].teams = value.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; });
      saveData();
      renderLeaderboard();
    }

    fetchData();
  </script>
</body>
</html>
