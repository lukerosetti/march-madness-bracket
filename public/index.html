<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness Bracket Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#0f0f13 0%,#1a1a24 100%);color:#fff;min-height:100vh}
    #app{max-width:1200px;margin:0 auto;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.06);margin-bottom:24px}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#00d4aa,#00b894);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-text{font-size:18px;font-weight:700}
    .logo-sub{font-size:12px;color:rgba(255,255,255,0.5)}
    .live-badge{padding:8px 16px;background:rgba(0,212,170,0.15);border:1px solid rgba(0,212,170,0.3);border-radius:20px;font-size:12px;color:#00d4aa;font-weight:600}
    .tabs{display:flex;gap:6px;padding:6px;background:rgba(255,255,255,0.03);border-radius:14px;border:1px solid rgba(255,255,255,0.06);margin-bottom:24px}
    .tab{flex:1;padding:12px;border-radius:10px;text-align:center;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);cursor:pointer;border:none;background:transparent;transition:all 0.2s}
    .tab.active{background:linear-gradient(135deg,#00d4aa,#00b894);color:#0f0f13;font-weight:600}
    .tab:hover:not(.active){background:rgba(255,255,255,0.05)}
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:16px}
    .player-card{display:flex;align-items:center;gap:16px;padding:16px 20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:12px;transition:all 0.2s}
    .player-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12)}
    .player-card.first{background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,180,0,0.06));border:1px solid rgba(255,215,0,0.25)}
    .avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;background-size:cover;background-position:center}
    .avatar.no-image{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .rank{width:28px;text-align:center;font-size:16px;font-weight:700;color:rgba(255,255,255,0.4)}
    .player-info{flex:1}
    .player-name{font-size:15px;font-weight:600;margin-bottom:4px}
    .player-teams{display:flex;gap:6px;flex-wrap:wrap}
    .team-chip{padding:4px 10px;background:rgba(255,255,255,0.08);border-radius:6px;font-size:11px;color:rgba(255,255,255,0.7)}
    .team-chip.eliminated{text-decoration:line-through;opacity:0.5}
    .score{text-align:right}
    .score-value{font-size:24px;font-weight:800;color:#00d4aa}
    .score-change{font-size:11px;color:rgba(255,255,255,0.5)}
    .score-change.positive{color:#00d4aa}
    .score-change.negative{color:#ff6b6b}
    .region-pills{display:flex;gap:8px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
    .region-pill{padding:10px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s}
    .region-pill:hover{background:rgba(255,255,255,0.1)}
    .region-pill.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff;font-weight:600}
    .region-pill.final{background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.3);color:#ffd700}
    .bracket-container{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
    .round{flex-shrink:0;width:180px}
    .round-title{text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .matchup{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:8px;overflow:hidden}
    .matchup.live{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3)}
    .matchup-team{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .matchup-team:last-child{border-bottom:none}
    .matchup-team.winner{background:rgba(0,212,170,0.1)}
    .matchup-team.loser{opacity:0.5}
